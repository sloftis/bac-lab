
###############################################################################
# GitHub Actions Workflow – IAC Validate
###############################################################################

name: Run Semantic Business Rules

on:
  workflow_dispatch:

jobs:
  iac-validate:
    name: IAC Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Load shared env vars
        run: cat .env >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install iac-validate
        run: |
          pip install iac-validate
          iac-validate --version

      - name: Run iac-validate
        run: |
          set +e
          iac-validate -r rules data/org_global.nac.yaml --non-strict --verbosity DEBUG 2>&1 | tee iac_validate_output.txt
          exit_code=${PIPESTATUS[0]}

          echo ""
          echo "═══════════════════════════════════════════════════"
          if [ "$exit_code" -eq 0 ]; then
            echo "✅ iac-validate passed – no violations found."
          else
            echo "❌ iac-validate failed (exit code: $exit_code)"
            echo "═══════════════════════════════════════════════════"
            echo ""
            echo "::error::iac-validate found violations. See output above for details."
          fi
          exit $exit_code

      - name: Upload validation output
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: iac-validate-output
          path: iac_validate_output.txt
          retention-days: 7
